swagger: "2.0"
info:
  title: Bank Argent API - Transactions
  description: Proposed API for managing user transactions
  version: "1.0.0"

host: localhost:3001
basePath: /api/v1
schemes:
  - http

paths:
  /user/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Transactions
      summary: Get all user transactions
      description: Retrieve all transactions for the current user
      parameters:
        - in: header
          name: Authorization
          type: string
          required: true
          description: Bearer token
      responses:
        "200":
          description: Transactions retrieved successfully
          schema:
            type: array
            items:
              $ref: "#/definitions/Transaction"
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /user/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Transactions
      summary: Get a transaction
      description: Retrieve a specific transaction by ID
      parameters:
        - in: path
          name: transactionId
          type: integer
          required: true
        - in: header
          name: Authorization
          type: string
          required: true
      responses:
        "200":
          description: Transaction retrieved
          schema:
            $ref: "#/definitions/Transaction"
        "404":
          description: Transaction not found

    patch:
      security:
        - Bearer: []
      tags:
        - Transactions
      summary: Update transaction
      description: Update category or notes of a transaction
      parameters:
        - in: path
          name: transactionId
          type: integer
          required: true
        - in: header
          name: Authorization
          type: string
          required: true
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/TransactionUpdate"
      responses:
        "200":
          description: Transaction updated
          schema:
            $ref: "#/definitions/Transaction"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header

definitions:
  Transaction:
    type: object
    properties:
      id:
        type: integer
        example: 1
      date:
        type: string
        example: "2023-10-01"
      description:
        type: string
        example: "Grocery store"
      amount:
        type: number
        example: 50.25
      balance:
        type: number
        example: 1200.50
      category:
        type: string
        example: "Food"
      notes:
        type: string
        example: "Weekly groceries"

  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
        example: "Food"
      notes:
        type: string
        example: "Updated note"