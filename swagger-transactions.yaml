swagger: "2.0"
info:
  title: Bank Argent API - Transactions Extension
  description: Additional endpoints for transaction management
  version: "1.0.0"

host: localhost:3001
basePath: /api/v1
schemes:
  - http

paths:
  /transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Get all transactions for current user
      description: Retrieve all transactions for the current month, optionally filtered by account
      parameters:
        - name: Authorization
          in: header
          type: string
          required: true
        - name: month
          in: query
          type: string
          required: false
          description: Filter by month (YYYY-MM)
        - name: accountId
          in: query
          type: integer
          required: false
          description: Filter by account ID
      produces:
        - application/json
      responses:
        "200":
          description: Transactions retrieved successfully
          schema:
            $ref: "#/definitions/Transactions"
        "401":
          description: Unauthorized
        "500":
          description: Server error

    post:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Create a transaction
      description: Add a new transaction
      parameters:
        - name: Authorization
          in: header
          type: string
          required: true
        - in: body
          name: transaction
          required: true
          schema:
            $ref: "#/definitions/Transaction"
      responses:
        "201":
          description: Transaction created
          schema:
            $ref: "#/definitions/Transaction"
        "400":
          description: Invalid input

  /transaction/{idTransaction}:
    get:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Get a specific transaction
      parameters:
        - name: Authorization
          in: header
          type: string
          required: true
        - name: idTransaction
          in: path
          type: integer
          required: true
      responses:
        "200":
          description: Transaction retrieved
          schema:
            $ref: "#/definitions/Transaction"
        "404":
          description: Transaction not found

    patch:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Update a transaction
      description: Update category or note
      parameters:
        - name: Authorization
          in: header
          type: string
          required: true
        - name: idTransaction
          in: path
          type: integer
          required: true
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/TransactionUpdate"
      responses:
        "200":
          description: Transaction updated
          schema:
            $ref: "#/definitions/Transaction"
        "400":
          description: Invalid input

    delete:
      security:
        - Bearer: []
      tags:
        - Transaction Module
      summary: Delete a transaction
      parameters:
        - name: Authorization
          in: header
          type: string
          required: true
        - name: idTransaction
          in: path
          type: integer
          required: true
      responses:
        "204":
          description: Transaction deleted
        "404":
          description: Transaction not found

definitions:
  Transaction:
    type: object
    properties:
      id:
        type: integer
      date:
        type: string
      amount:
        type: number
      description:
        type: string
      category:
        type: string
      note:
        type: string
      accountId:
        type: integer

  Transactions:
    type: array
    items:
      $ref: "#/definitions/Transaction"

  TransactionUpdate:
    type: object
    properties:
      category:
        type: string
      note:
        type: string